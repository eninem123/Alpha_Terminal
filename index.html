<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>AI策略分析 — 股票回撤不怕</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#0a0e17;--panel:#111827;--card:#0f1729;--card-alt:#151f32;
      --accent:#00d4aa;--red:#ef4444;--blue:#3b82f6;--accent2:#38bdf8;
      --text:#e0e6ed;--muted:#6b7280;
      --line:rgba(100,116,139,.12);--line-hover:rgba(0,212,170,.25);
      --glow:rgba(0,212,170,.15);
      --font:'Inter',-apple-system,'PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif;
      --mono:'JetBrains Mono','SF Mono',monospace;
      --radius:12px;--radius-lg:16px;
    }
    html,body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;-webkit-font-smoothing:antialiased}
    .container{max-width:440px;margin:0 auto;padding:0 20px}

    /* === AMBIENT GLOW === */
    .ambient-glow{position:fixed;width:500px;height:500px;border-radius:50%;filter:blur(120px);opacity:.06;pointer-events:none;z-index:0}
    .ambient-glow.g1{top:-200px;right:-100px;background:var(--accent)}
    .ambient-glow.g2{bottom:-200px;left:-100px;background:var(--accent2)}

    /* === HERO === */
    .hero{padding:48px 0 32px;text-align:center;position:relative;z-index:1}
    .hero h1{font-size:26px;font-weight:800;line-height:1.35;background:linear-gradient(135deg,#fff 0%,#94a3b8 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:0 0 40px rgba(0,212,170,.1)}
    .hero p{margin-top:12px;font-size:15px;color:var(--muted);line-height:1.6}
    .hero .highlight{color:var(--accent);font-weight:700}

    /* === STEP INDICATOR === */
    .steps{display:flex;justify-content:center;gap:8px;margin-bottom:28px;position:relative;z-index:1}
    .step-dot{width:32px;height:4px;border-radius:2px;background:rgba(100,116,139,.15);transition:all .3s}
    .step-dot.active{background:var(--accent);width:48px;box-shadow:0 0 12px rgba(0,212,170,.4)}

    /* === PANELS === */
    .panel{display:none;animation:fadeIn .35s ease;position:relative;z-index:1}
    .panel.active{display:block}
    @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

    /* === STEP 1: INPUT === */
    .input-box{background:var(--card);border:1px solid var(--line);border-radius:var(--radius-lg);padding:20px;margin-bottom:16px;transition:border-color .25s,box-shadow .25s,transform .2s;position:relative;overflow:hidden}
    .input-box::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,212,170,.3),transparent);opacity:0;transition:opacity .3s}
    .input-box:hover{border-color:var(--line-hover);box-shadow:0 4px 20px rgba(0,212,170,.06);transform:translateY(-1px)}
    .input-box:hover::before{opacity:1}
    .input-box label{display:block;font-size:11px;color:var(--muted);margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
    .code-input{width:100%;background:rgba(10,14,23,.6);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;color:#fff;font-size:18px;font-weight:600;letter-spacing:2px;text-align:center;outline:none;transition:border-color .2s,box-shadow .2s;font-family:var(--mono)}
    .code-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}
    .code-input::placeholder{color:rgba(107,114,128,.5);letter-spacing:1px;font-weight:400}

    .profile-group{display:flex;gap:10px;margin-bottom:20px}
    .profile-btn{flex:1;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px 8px;text-align:center;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden}
    .profile-btn::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0;transition:opacity .3s}
    .profile-btn .icon{font-size:24px;display:block;margin-bottom:4px}
    .profile-btn .name{font-size:13px;font-weight:600;color:var(--text)}
    .profile-btn .desc{font-size:11px;color:var(--muted);margin-top:2px}
    .profile-btn:hover{border-color:var(--line-hover);transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,212,170,.1)}
    .profile-btn:hover::before{opacity:1}
    .profile-btn.selected{border-color:var(--accent);background:rgba(0,212,170,.08)}
    .profile-btn.selected .name{color:var(--accent)}
    .profile-btn.selected::before{opacity:1}

    .run-btn{width:100%;padding:16px;border:none;border-radius:var(--radius);font-size:16px;font-weight:700;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);background:linear-gradient(135deg,var(--accent),#00a388);color:#0a0e17;box-shadow:0 4px 20px rgba(0,212,170,.3);position:relative;overflow:hidden}
    .run-btn::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);transition:left .5s}
    .run-btn:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(0,212,170,.45)}
    .run-btn:hover::after{left:100%}
    .run-btn:active{transform:translateY(0)}
    .run-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

    /* === STEP 2: RESULTS === */
    .compare-banner{background:var(--card);border:1px solid var(--line);border-radius:var(--radius-lg);padding:20px;margin-bottom:16px;display:flex;align-items:center;gap:16px;transition:border-color .25s,box-shadow .25s,transform .2s;position:relative;overflow:hidden}
    .compare-banner::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,212,170,.3),transparent);opacity:0;transition:opacity .3s}
    .compare-banner:hover{border-color:var(--line-hover);box-shadow:0 4px 20px rgba(0,212,170,.06);transform:translateY(-1px)}
    .compare-banner:hover::before{opacity:1}
    .compare-item{flex:1;text-align:center}
    .compare-item .label{font-size:12px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
    .compare-item .value{font-size:28px;font-weight:800;font-family:var(--mono)}
    .compare-item .value.red{color:var(--red);text-shadow:0 0 12px rgba(239,68,68,.15)}
    .compare-item .value.green{color:var(--accent);text-shadow:0 0 12px rgba(0,212,170,.15)}
    .compare-vs{font-size:14px;color:var(--muted);font-weight:700;flex-shrink:0}

    .chart-wrap{background:var(--card);border:1px solid var(--line);border-radius:var(--radius-lg);padding:16px;margin-bottom:16px;transition:border-color .25s,box-shadow .25s,transform .2s;position:relative;overflow:hidden}
    .chart-wrap::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,212,170,.3),transparent);opacity:0;transition:opacity .3s}
    .chart-wrap:hover{border-color:var(--line-hover);box-shadow:0 4px 20px rgba(0,212,170,.06);transform:translateY(-1px)}
    .chart-wrap:hover::before{opacity:1}
    .chart-wrap .chart-title{font-size:11px;color:var(--muted);margin-bottom:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
    #chartDiv{width:100%;height:240px;margin:8px 0}

    .metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
    .metric-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px;text-align:center;transition:border-color .2s,transform .2s,box-shadow .2s;position:relative;overflow:hidden}
    .metric-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,212,170,.2),transparent);opacity:0;transition:opacity .3s}
    .metric-card:hover{border-color:var(--line-hover);transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,212,170,.08)}
    .metric-card:hover::before{opacity:1}
    .metric-card .m-label{font-size:11px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
    .metric-card .m-value{font-size:20px;font-weight:700;font-family:var(--mono)}
    .metric-card .m-value.good{color:var(--accent);text-shadow:0 0 12px rgba(0,212,170,.15)}
    .metric-card .m-value.bad{color:var(--red);text-shadow:0 0 12px rgba(239,68,68,.15)}
    .metric-card .m-value.neutral{color:var(--text)}

    .back-btn{width:100%;padding:14px;background:transparent;border:1px solid var(--line);border-radius:var(--radius);color:var(--muted);font-size:14px;font-weight:600;cursor:pointer;margin-bottom:12px;transition:all .3s cubic-bezier(.4,0,.2,1)}
    .back-btn:hover{border-color:var(--line-hover);color:var(--text);transform:translateY(-1px);box-shadow:0 2px 12px rgba(0,212,170,.06)}

    /* === STEP 3: CTA === */
    .cta-panel{text-align:center;padding:32px 0}
    .cta-panel .check-icon{font-size:48px;margin-bottom:16px}
    .cta-panel h2{font-size:22px;font-weight:800;margin-bottom:8px}
    .cta-panel p{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:24px}
    .cta-form{display:flex;gap:8px;margin-bottom:12px}
    .cta-form input{flex:1;background:rgba(10,14,23,.6);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;color:#fff;font-size:14px;outline:none;transition:border-color .2s,box-shadow .2s}
    .cta-form input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}
    .cta-form button{padding:14px 24px;border:none;border-radius:var(--radius);background:linear-gradient(135deg,var(--accent),#00a388);color:#0a0e17;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .3s;box-shadow:0 2px 12px rgba(0,212,170,.2)}
    .cta-form button:hover{box-shadow:0 4px 20px rgba(0,212,170,.35);transform:translateY(-1px)}
    .cta-note{font-size:12px;color:var(--muted)}

    /* === LOADING === */
    .loading-overlay{position:fixed;inset:0;background:rgba(10,14,23,.92);z-index:100;display:none;align-items:center;justify-content:center;flex-direction:column;backdrop-filter:blur(8px)}
    .loading-overlay.show{display:flex}
    .spinner{width:40px;height:40px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-text{margin-top:16px;color:var(--muted);font-size:14px}

    /* === PULSE === */
    .pulse{animation:pulse 2s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

    /* === ERROR === */
    .error-msg{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:var(--radius);padding:12px 16px;color:var(--red);font-size:13px;margin-bottom:12px;display:none}
    .error-msg.show{display:block}

    /* === SCROLLBAR === */
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:rgba(0,212,170,.2);border-radius:2px}
    ::selection{background:rgba(0,212,170,.2);color:var(--text)}
  </style>
</head>
<body>

<!-- Ambient glow -->
<div class="ambient-glow g1"></div>
<div class="ambient-glow g2"></div>

<div class="container">
  <!-- HERO -->
  <div class="hero">
    <h1>股票跌了不可怕<br>有策略，只回撤一点点</h1>
    <p>输入任意股票代码，AI量化策略 vs 直线持有<br>3秒看清 <span class="highlight">差距有多大</span></p>
  </div>

  <!-- STEP DOTS -->
  <div class="steps">
    <div class="step-dot active" id="dot1"></div>
    <div class="step-dot" id="dot2"></div>
    <div class="step-dot" id="dot3"></div>
  </div>

  <!-- STEP 1: INPUT -->
  <div class="panel active" id="step1">
    <div class="input-box">
      <label>股票代码</label>
      <input type="text" class="code-input" id="stockCode" placeholder="例如 600519" maxlength="6" inputmode="numeric" autocomplete="off" />
    </div>

    <div class="profile-group">
      <div class="profile-btn" data-profile="conservative" onclick="selectProfile(this)">
        <span class="icon">🛡️</span>
        <span class="name">保守</span>
        <span class="desc">低回撤</span>
      </div>
      <div class="profile-btn selected" data-profile="moderate" onclick="selectProfile(this)">
        <span class="icon">⚖️</span>
        <span class="name">稳健</span>
        <span class="desc">攻守兼备</span>
      </div>
      <div class="profile-btn" data-profile="aggressive" onclick="selectProfile(this)">
        <span class="icon">🚀</span>
        <span class="name">激进</span>
        <span class="desc">高收益</span>
      </div>
    </div>

    <div class="error-msg" id="errorMsg"></div>
    <button class="run-btn" id="runBtn" onclick="runAnalysis()">开始分析</button>
  </div>

  <!-- STEP 2: RESULTS -->
  <div class="panel" id="step2">
    <div class="compare-banner">
      <div class="compare-item">
        <div class="label">直线持有</div>
        <div class="value red" id="holdReturn">--</div>
      </div>
      <div class="compare-vs">VS</div>
      <div class="compare-item">
        <div class="label">策略收益</div>
        <div class="value green" id="stratReturn">--</div>
      </div>
    </div>

    <div class="chart-wrap">
      <div class="chart-title">📈 收益曲线对比</div>
      <div id="chartDiv" style="width:100%;height:240px"></div>
      <div style="display:flex;justify-content:center;gap:20px;margin-top:10px">
        <span style="font-size:12px;color:#5a6a7e"><span style="display:inline-block;width:20px;height:2px;background:#5a6a7e;vertical-align:middle;margin-right:4px"></span>持有</span>
        <span style="font-size:12px;color:#00d4aa"><span style="display:inline-block;width:20px;height:2px;background:#00d4aa;vertical-align:middle;margin-right:4px"></span>策略</span>
      </div>
    </div>

    <div class="metrics-grid">
      <div class="metric-card">
        <div class="m-label">最大回撤</div>
        <div class="m-value bad" id="mDD">--</div>
      </div>
      <div class="metric-card">
        <div class="m-label">年化收益</div>
        <div class="m-value" id="mAnnual">--</div>
      </div>
      <div class="metric-card">
        <div class="m-label">夏普比率</div>
        <div class="m-value neutral" id="mSharpe">--</div>
      </div>
      <div class="metric-card">
        <div class="m-label">胜率</div>
        <div class="m-value neutral" id="mWinRate">--</div>
      </div>
    </div>

    <button class="back-btn" onclick="goStep(1)">← 重新分析</button>
    <button class="run-btn" onclick="goStep(3)">📋 获取完整策略报告</button>
  </div>

  <!-- STEP 3: CTA -->
  <div class="panel" id="step3">
    <div class="cta-panel">
      <div class="check-icon">🔒</div>
      <h2>完整策略报告已生成</h2>
      <p style="color:#ef4444;font-size:14px;margin:8px 0">添加金融顾问微信，免费获取完整报告</p>
      <div class="wechat-cta" style="text-align:center;margin:16px 0">
        <img src="wechat.jpg" style="width:150px;height:150px;border-radius:12px;border:2px solid rgba(100,116,139,.12)" />
        <p style="color:#6b7280;font-size:12px;margin-top:8px">扫码添加金融顾问</p>
        <button onclick="copyWechat()" style="background:linear-gradient(135deg,#00d4aa,#00a388);color:#0a0e17;border:none;padding:12px 28px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;margin-top:10px;width:100%;box-shadow:0 4px 16px rgba(0,212,170,.25);transition:all .3s" onmouseover="this.style.boxShadow='0 6px 24px rgba(0,212,170,.4)';this.style.transform='translateY(-1px)'" onmouseout="this.style.boxShadow='0 4px 16px rgba(0,212,170,.25)';this.style.transform='none'">📋 复制微信号: XLN31689</button>
      </div>
      <div style="border-top:1px solid rgba(100,116,139,.12);padding-top:16px;margin-top:16px">
        <p style="color:#6b7280;font-size:13px;margin-bottom:8px">📱 留下手机号，顾问主动联系您</p>
        <div class="cta-form">
          <input type="tel" id="contactInput" placeholder="请输入11位手机号" maxlength="11" pattern="1[3-9]\d{9}" />
          <button onclick="submitContact()">提交</button>
        </div>
      </div>
      <div class="cta-note">🔒 信息严格保密，仅用于1对1策略服务</div>
    </div>
    <button class="back-btn" onclick="goStep(2)">← 返回查看结果</button>
  </div>
</div>

<!-- LOADING -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">正在回测分析中...</div>
</div>

<script>
  let selectedProfile = 'moderate';
  let lastResult = null;

  function selectProfile(el) {
    document.querySelectorAll('.profile-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
    selectedProfile = el.dataset.profile;
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('show');
  }

  function hideError() {
    document.getElementById('errorMsg').classList.remove('show');
  }

  function goStep(n) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('step' + n).classList.add('active');
    document.querySelectorAll('.step-dot').forEach((d, i) => {
      d.classList.toggle('active', i < n);
    });
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  async function runAnalysis() {
    hideError();
    const code = document.getElementById('stockCode').value.trim();
    if (!code || !/^\d{6}$/.test(code)) {
      showError('请输入正确的6位股票代码');
      return;
    }

    const btn = document.getElementById('runBtn');
    btn.disabled = true;
    document.getElementById('loadingOverlay').classList.add('show');

    try {
      const url = `/xuequ/bt/backtest?code=${code}&strategy=ma_cross&profile=${selectedProfile}`;
      const resp = await fetch(url);
      if (!resp.ok) throw new Error('接口返回错误');
      const data = await resp.json();
      if (data.error) throw new Error(data.error);
      lastResult = data;
      renderResults(data);
      goStep(2);
    } catch (e) {
      showError('分析失败：' + e.message + '。请检查股票代码是否正确。');
    } finally {
      btn.disabled = false;
      document.getElementById('loadingOverlay').classList.remove('show');
    }
  }

  function renderResults(data) {
    const m = data.metrics;
    const stratRet = m.total_return;
    const holdRet = m.hold_return || 0;
    document.getElementById('holdReturn').textContent = (holdRet >= 0 ? '+' : '') + holdRet.toFixed(1) + '%';
    document.getElementById('stratReturn').textContent = (stratRet >= 0 ? '+' : '') + stratRet.toFixed(1) + '%';
    document.getElementById('holdReturn').className = 'value ' + (holdRet < 0 ? 'red' : 'green');
    document.getElementById('stratReturn').className = 'value ' + (stratRet < 0 ? 'red' : 'green');
    document.getElementById('mDD').textContent = m.max_drawdown.toFixed(1) + '%';
    document.getElementById('mAnnual').textContent = (m.annual_return >= 0 ? '+' : '') + m.annual_return.toFixed(1) + '%';
    document.getElementById('mAnnual').className = 'm-value ' + (m.annual_return >= 0 ? 'good' : 'bad');
    document.getElementById('mSharpe').textContent = m.sharpe_ratio.toFixed(2);
    document.getElementById('mWinRate').textContent = m.win_rate.toFixed(0) + '%';
    drawChart(data);
  }

  function drawChart(data) {
    var chartDom = document.getElementById('chartDiv');
    if (!chartDom) return;
    var myChart = echarts.init(chartDom, 'dark');
    var equity = data.equity_curve;
    if (!equity || equity.length < 2) return;

    var dates = equity.map(function(p){return p.date.slice(5)});
    var holdPct = equity.map(function(p){return p.hold_pct});
    var stratPct = equity.map(function(p){return p.strat_pct});

    var option = {
      backgroundColor: 'transparent',
      grid: {left: 48, right: 16, top: 20, bottom: 30},
      xAxis: {type: 'category', data: dates, axisLabel: {color: '#6b7280', fontSize: 10, fontFamily: 'JetBrains Mono,monospace'}, axisLine: {lineStyle: {color: 'rgba(100,116,139,.12)'}}, splitLine: {show: false}},
      yAxis: {type: 'value', axisLabel: {color: '#6b7280', fontSize: 10, formatter: '{value}%', fontFamily: 'JetBrains Mono,monospace'}, axisLine: {show: false}, splitLine: {lineStyle: {color: 'rgba(100,116,139,.08)'}}, splitNumber: 4},
      tooltip: {trigger: 'axis', backgroundColor: '#111827', borderColor: 'rgba(100,116,139,.12)', textStyle: {color: '#e0e6ed', fontSize: 12, fontFamily: 'Inter,-apple-system,sans-serif'}, formatter: function(params) { var s = params[0].axisValue + '<br/>'; params.forEach(function(p){s += '<span style="color:'+p.color+'">●</span> '+p.seriesName+': '+p.value+'%<br/>';}); return s; }},
      series: [
        {name: '持有', type: 'line', data: holdPct, smooth: true, symbol: 'none', lineStyle: {color: '#5a6a7e', width: 2}, areaStyle: {color: {type: 'linear', x: 0, y: 0, x2: 0, y2: 1, colorStops: [{offset: 0, color: 'rgba(90,106,126,0.15)'}, {offset: 1, color: 'rgba(90,106,126,0)'}]}}},
        {name: '策略', type: 'line', data: stratPct, smooth: true, symbol: 'none', lineStyle: {color: '#00d4aa', width: 2.5}, areaStyle: {color: {type: 'linear', x: 0, y: 0, x2: 0, y2: 1, colorStops: [{offset: 0, color: 'rgba(0,212,170,0.2)'}, {offset: 1, color: 'rgba(0,212,170,0)'}]}}}
      ]
    };
    myChart.setOption(option);
    window.addEventListener('resize', function(){myChart.resize()});
  }

  function submitContact() {
    const val = document.getElementById('contactInput').value.trim();
    if (!val) return;
    alert('感谢！报告将发送至：' + val);
  }

  function copyWechat() {
    navigator.clipboard.writeText("XLN31689").then(() => {
      alert("✅ 微信号已复制: XLN31689");
    }).catch(() => {
      const input = document.createElement("input");
      input.value = "XLN31689";
      document.body.appendChild(input);
      input.select();
      document.execCommand("copy");
      document.body.removeChild(input);
      alert("✅ 微信号已复制: XLN31689");
    });
  }

  // Enter key support
  document.getElementById('stockCode').addEventListener('keydown', e => {
    if (e.key === 'Enter') runAnalysis();
  });
</script>
</body>
</html>
