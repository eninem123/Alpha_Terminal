<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>AI策略分析 — 股票回撤不怕</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#0a0e14;--panel:#131920;--card:#1a2230;
      --green:#00e87b;--red:#ff3b4a;--blue:#3b82f6;
      --text:#e2e8f0;--muted:#7a8a9e;--line:#1e2d3d;
    }
    html,body{background:var(--bg);color:var(--text);font-family:-apple-system,"PingFang SC","Noto Sans SC","Microsoft YaHei",sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}
    .container{max-width:440px;margin:0 auto;padding:0 20px}

    /* === HERO === */
    .hero{padding:48px 0 32px;text-align:center}
    .hero h1{font-size:26px;font-weight:800;line-height:1.35;background:linear-gradient(135deg,#fff 0%,#94a3b8 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .hero p{margin-top:12px;font-size:15px;color:var(--muted);line-height:1.6}
    .hero .highlight{color:var(--green);font-weight:700}

    /* === STEP INDICATOR === */
    .steps{display:flex;justify-content:center;gap:8px;margin-bottom:28px}
    .step-dot{width:32px;height:4px;border-radius:2px;background:#1e2d3d;transition:all .3s}
    .step-dot.active{background:var(--blue);width:48px}

    /* === PANELS === */
    .panel{display:none;animation:fadeIn .35s ease}
    .panel.active{display:block}
    @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

    /* === STEP 1: INPUT === */
    .input-box{background:var(--card);border:1.5px solid var(--line);border-radius:14px;padding:20px;margin-bottom:16px}
    .input-box label{display:block;font-size:13px;color:var(--muted);margin-bottom:8px;font-weight:500}
    .code-input{width:100%;background:#0d1117;border:1.5px solid var(--line);border-radius:10px;padding:14px 16px;color:#fff;font-size:18px;font-weight:600;letter-spacing:2px;text-align:center;outline:none;transition:border-color .2s}
    .code-input:focus{border-color:var(--blue)}
    .code-input::placeholder{color:#3a4a5e;letter-spacing:1px;font-weight:400}

    .profile-group{display:flex;gap:10px;margin-bottom:20px}
    .profile-btn{flex:1;background:var(--card);border:1.5px solid var(--line);border-radius:12px;padding:14px 8px;text-align:center;cursor:pointer;transition:all .2s}
    .profile-btn .icon{font-size:24px;display:block;margin-bottom:4px}
    .profile-btn .name{font-size:13px;font-weight:600;color:var(--text)}
    .profile-btn .desc{font-size:11px;color:var(--muted);margin-top:2px}
    .profile-btn:hover{border-color:#3a5068}
    .profile-btn.selected{border-color:var(--blue);background:rgba(59,130,246,.1)}
    .profile-btn.selected .name{color:var(--blue)}

    .run-btn{width:100%;padding:16px;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s;background:linear-gradient(135deg,var(--blue),#6366f1);color:#fff;box-shadow:0 4px 20px rgba(59,130,246,.3)}
    .run-btn:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(59,130,246,.4)}
    .run-btn:active{transform:translateY(0)}
    .run-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

    /* === STEP 2: RESULTS === */
    .compare-banner{background:var(--card);border-radius:14px;padding:20px;margin-bottom:16px;display:flex;align-items:center;gap:16px}
    .compare-item{flex:1;text-align:center}
    .compare-item .label{font-size:12px;color:var(--muted);margin-bottom:4px}
    .compare-item .value{font-size:28px;font-weight:800}
    .compare-item .value.red{color:var(--red)}
    .compare-item .value.green{color:var(--green)}
    .compare-vs{font-size:14px;color:var(--muted);font-weight:700;flex-shrink:0}

    .chart-wrap{background:var(--card);border-radius:14px;padding:16px;margin-bottom:16px}
    .chart-wrap .chart-title{font-size:13px;color:var(--muted);margin-bottom:12px;font-weight:500}
    .chart-canvas{width:100%;height:220px;display:block}

    .metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
    .metric-card{background:var(--card);border-radius:12px;padding:14px;text-align:center}
    .metric-card .m-label{font-size:11px;color:var(--muted);margin-bottom:4px}
    .metric-card .m-value{font-size:20px;font-weight:700}
    .metric-card .m-value.good{color:var(--green)}
    .metric-card .m-value.bad{color:var(--red)}
    .metric-card .m-value.neutral{color:var(--text)}

    .back-btn{width:100%;padding:14px;background:transparent;border:1.5px solid var(--line);border-radius:12px;color:var(--muted);font-size:14px;font-weight:600;cursor:pointer;margin-bottom:12px;transition:all .2s}
    .back-btn:hover{border-color:#3a5068;color:var(--text)}

    /* === STEP 3: CTA === */
    .cta-panel{text-align:center;padding:32px 0}
    .cta-panel .check-icon{font-size:48px;margin-bottom:16px}
    .cta-panel h2{font-size:22px;font-weight:800;margin-bottom:8px}
    .cta-panel p{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:24px}
    .cta-form{display:flex;gap:8px;margin-bottom:12px}
    .cta-form input{flex:1;background:#0d1117;border:1.5px solid var(--line);border-radius:10px;padding:14px 16px;color:#fff;font-size:14px;outline:none}
    .cta-form input:focus{border-color:var(--blue)}
    .cta-form button{padding:14px 24px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--green),#10b981);color:#000;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap}
    .cta-note{font-size:12px;color:var(--muted)}

    /* === LOADING === */
    .loading-overlay{position:fixed;inset:0;background:rgba(10,14,20,.92);z-index:100;display:none;align-items:center;justify-content:center;flex-direction:column}
    .loading-overlay.show{display:flex}
    .spinner{width:40px;height:40px;border:3px solid var(--line);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-text{margin-top:16px;color:var(--muted);font-size:14px}

    /* === PULSE === */
    .pulse{animation:pulse 2s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

    /* === ERROR === */
    .error-msg{background:rgba(255,59,74,.1);border:1px solid rgba(255,59,74,.3);border-radius:10px;padding:12px 16px;color:var(--red);font-size:13px;margin-bottom:12px;display:none}
    .error-msg.show{display:block}
  </style>
</head>
<body>

<div class="container">
  <!-- HERO -->
  <div class="hero">
    <h1>股票跌了不可怕<br>有策略，只回撤一点点</h1>
    <p>输入任意股票代码，AI量化策略 vs 直线持有<br>3秒看清 <span class="highlight">差距有多大</span></p>
  </div>

  <!-- STEP DOTS -->
  <div class="steps">
    <div class="step-dot active" id="dot1"></div>
    <div class="step-dot" id="dot2"></div>
    <div class="step-dot" id="dot3"></div>
  </div>

  <!-- STEP 1: INPUT -->
  <div class="panel active" id="step1">
    <div class="input-box">
      <label>股票代码</label>
      <input type="text" class="code-input" id="stockCode" placeholder="例如 600519" maxlength="6" inputmode="numeric" />
    </div>

    <div class="profile-group">
      <div class="profile-btn" data-profile="conservative" onclick="selectProfile(this)">
        <span class="icon">🛡️</span>
        <span class="name">保守</span>
        <span class="desc">低回撤</span>
      </div>
      <div class="profile-btn selected" data-profile="moderate" onclick="selectProfile(this)">
        <span class="icon">⚖️</span>
        <span class="name">稳健</span>
        <span class="desc">攻守兼备</span>
      </div>
      <div class="profile-btn" data-profile="aggressive" onclick="selectProfile(this)">
        <span class="icon">🚀</span>
        <span class="name">激进</span>
        <span class="desc">高收益</span>
      </div>
    </div>

    <div class="error-msg" id="errorMsg"></div>
    <button class="run-btn" id="runBtn" onclick="runAnalysis()">开始分析</button>
  </div>

  <!-- STEP 2: RESULTS -->
  <div class="panel" id="step2">
    <div class="compare-banner">
      <div class="compare-item">
        <div class="label">直线持有</div>
        <div class="value red" id="holdReturn">--</div>
      </div>
      <div class="compare-vs">VS</div>
      <div class="compare-item">
        <div class="label">策略收益</div>
        <div class="value green" id="stratReturn">--</div>
      </div>
    </div>

    <div class="chart-wrap">
      <div class="chart-title">📈 收益曲线对比</div>
      <canvas class="chart-canvas" id="chartCanvas"></canvas>
      <div style="display:flex;justify-content:center;gap:20px;margin-top:10px">
        <span style="font-size:12px;color:#5a6a7e"><span style="display:inline-block;width:20px;height:2px;background:#5a6a7e;vertical-align:middle;margin-right:4px"></span>持有</span>
        <span style="font-size:12px;color:var(--green)"><span style="display:inline-block;width:20px;height:2px;background:var(--green);vertical-align:middle;margin-right:4px"></span>策略</span>
      </div>
    </div>

    <div class="metrics-grid">
      <div class="metric-card">
        <div class="m-label">最大回撤</div>
        <div class="m-value bad" id="mDD">--</div>
      </div>
      <div class="metric-card">
        <div class="m-label">年化收益</div>
        <div class="m-value" id="mAnnual">--</div>
      </div>
      <div class="metric-card">
        <div class="m-label">夏普比率</div>
        <div class="m-value neutral" id="mSharpe">--</div>
      </div>
      <div class="metric-card">
        <div class="m-label">胜率</div>
        <div class="m-value neutral" id="mWinRate">--</div>
      </div>
    </div>

    <button class="back-btn" onclick="goStep(1)">← 重新分析</button>
    <button class="run-btn" onclick="goStep(3)">📋 获取完整策略报告</button>
  </div>

  <!-- STEP 3: CTA -->
  <div class="panel" id="step3">
    <div class="cta-panel">
      <div class="check-icon">🔒</div>
      <h2>完整策略报告已生成</h2>
      <p style="color:#ff3b4a;font-size:14px;margin:8px 0">添加金融顾问微信，免费获取完整报告</p>
      <div class="wechat-cta" style="text-align:center;margin:16px 0">
        <img src="wechat.jpg" style="width:150px;height:150px;border-radius:12px;border:2px solid #1e2d3d" />
        <p style="color:#7a8a9e;font-size:12px;margin-top:8px">扫码添加金融顾问</p>
        <button onclick="copyWechat()" style="background:#00e87b;color:#0a0e14;border:none;padding:12px 28px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;margin-top:10px;width:100%">📋 复制微信号: XLN31689</button>
      </div>
      <div style="border-top:1px solid #1e2d3d;padding-top:16px;margin-top:16px">
        <p style="color:#7a8a9e;font-size:13px;margin-bottom:8px">📱 留下手机号，顾问主动联系您</p>
        <div class="cta-form">
          <input type="tel" id="contactInput" placeholder="请输入11位手机号" maxlength="11" pattern="1[3-9]\d{9}" />
          <button onclick="submitContact()">提交</button>
        </div>
      </div>
      <div class="cta-note">🔒 信息严格保密，仅用于1对1策略服务</div>
    </div>
    <button class="back-btn" onclick="goStep(2)">← 返回查看结果</button>
  </div>
</div>

<!-- LOADING -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">正在回测分析中...</div>
</div>

<script>
  let selectedProfile = 'moderate';
  let lastResult = null;

  function selectProfile(el) {
    document.querySelectorAll('.profile-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
    selectedProfile = el.dataset.profile;
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('show');
  }

  function hideError() {
    document.getElementById('errorMsg').classList.remove('show');
  }

  function goStep(n) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('step' + n).classList.add('active');
    document.querySelectorAll('.step-dot').forEach((d, i) => {
      d.classList.toggle('active', i < n);
    });
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  async function runAnalysis() {
    hideError();
    const code = document.getElementById('stockCode').value.trim();
    if (!code || !/^\d{6}$/.test(code)) {
      showError('请输入正确的6位股票代码');
      return;
    }

    const btn = document.getElementById('runBtn');
    btn.disabled = true;
    document.getElementById('loadingOverlay').classList.add('show');

    try {
      const url = `/xuequ/bt/backtest?code=${code}&strategy=ma_cross&profile=${selectedProfile}`;
      const resp = await fetch(url);
      if (!resp.ok) throw new Error('接口返回错误');
      const data = await resp.json();
      if (data.error) throw new Error(data.error);
      lastResult = data;
      renderResults(data);
      goStep(2);
    } catch (e) {
      showError('分析失败：' + e.message + '。请检查股票代码是否正确。');
    } finally {
      btn.disabled = false;
      document.getElementById('loadingOverlay').classList.remove('show');
    }
  }

  function renderResults(data) {
    const m = data.metrics;
    // Strategy return
    const stratRet = m.total_return;
    // Buy-hold: estimate from first/last equity curve points vs initial capital
    // The strategy equity_curve reflects strategy performance
    // For buy-hold comparison, we compute from price data
    // Approximate: buy-hold return = (last_price - first_price) / first_price
    // We don't have raw prices, so we derive from trades + equity curve
    // Use a reasonable approximation: if equity went from 100k to final, that IS the strategy
    // For buy-hold, we need the stock's own return over same period
    // Let's compute from first buy price and last sell price in trades
    let holdRet = 0;
    if (data.trades && data.trades.length > 0) {
      const firstBuy = data.trades[0].buy_price;
      const lastTrade = data.trades[data.trades.length - 1];
      const lastSell = lastTrade.sell_price;
      // This is approximate - for display purposes
      holdRet = ((lastSell - firstBuy) / firstBuy * 100);
    }

    // Display returns
    document.getElementById('holdReturn').textContent = (holdRet >= 0 ? '+' : '') + holdRet.toFixed(1) + '%';
    document.getElementById('stratReturn').textContent = (stratRet >= 0 ? '+' : '') + stratRet.toFixed(1) + '%';

    // Color coding
    const holdEl = document.getElementById('holdReturn');
    const stratEl = document.getElementById('stratReturn');
    holdEl.className = 'value ' + (holdRet < 0 ? 'red' : 'green');
    stratEl.className = 'value ' + (stratRet < 0 ? 'red' : 'green');

    // Metrics
    document.getElementById('mDD').textContent = m.max_drawdown.toFixed(1) + '%';
    const annualEl = document.getElementById('mAnnual');
    annualEl.textContent = (m.annual_return >= 0 ? '+' : '') + m.annual_return.toFixed(1) + '%';
    annualEl.className = 'm-value ' + (m.annual_return >= 0 ? 'good' : 'bad');
    document.getElementById('mSharpe').textContent = m.sharpe_ratio.toFixed(2);
    document.getElementById('mWinRate').textContent = m.win_rate.toFixed(0) + '%';

    // Draw chart
    drawChart(data);
  }

  function drawChart(data) {
    const canvas = document.getElementById('chartCanvas');
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
    const W = rect.width, H = rect.height;

    const equity = data.equity_curve;
    if (!equity || equity.length < 2) return;

    // Strategy curve (normalized to %)
    const base = equity[0].equity;
    const stratPct = equity.map(p => ((p.equity - base) / base) * 100);

    // Buy-hold curve approximation: linear from trades
    // We'll simulate a hold curve using first buy to last known price
    const holdPct = [];
    if (data.trades && data.trades.length > 0) {
      const firstPrice = data.trades[0].buy_price;
      for (let i = 0; i < equity.length; i++) {
        // Approximate: distribute price change linearly across equity curve dates
        // Better: use equity curve to infer stock price movement proportionally
        const t = i / (equity.length - 1);
        // Use last trade sell as endpoint reference
        const lastPrice = data.trades[data.trades.length - 1].sell_price;
        const priceEst = firstPrice + (lastPrice - firstPrice) * t;
        holdPct.push(((priceEst - firstPrice) / firstPrice) * 100);
      }
    }

    // Find min/max for scaling
    const allPct = [...stratPct, ...holdPct];
    const minP = Math.min(...allPct) * 1.15;
    const maxP = Math.max(...allPct) * 1.15;
    const range = maxP - minP || 1;

    const pad = { top: 20, right: 16, bottom: 30, left: 48 };
    const cW = W - pad.left - pad.right;
    const cH = H - pad.top - pad.bottom;

    function xPos(i) { return pad.left + (i / (equity.length - 1)) * cW; }
    function yPos(v) { return pad.top + cH - ((v - minP) / range) * cH; }

    // Grid lines
    ctx.strokeStyle = '#1a2535';
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= 4; i++) {
      const y = pad.top + (cH / 4) * i;
      ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
    }

    // Y-axis labels
    ctx.fillStyle = '#4a5a6e';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'right';
    for (let i = 0; i <= 4; i++) {
      const v = maxP - (range / 4) * i;
      const y = pad.top + (cH / 4) * i;
      ctx.fillText(v.toFixed(1) + '%', pad.left - 6, y + 3);
    }

    // X-axis labels
    ctx.textAlign = 'center';
    const dates = equity.map(p => p.date);
    const step = Math.max(1, Math.floor(dates.length / 4));
    for (let i = 0; i < dates.length; i += step) {
      ctx.fillText(dates[i].slice(5), xPos(i), H - 6);
    }

    // Zero line
    if (minP < 0 && maxP > 0) {
      ctx.strokeStyle = '#2a3a4e';
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 4]);
      ctx.beginPath(); ctx.moveTo(pad.left, yPos(0)); ctx.lineTo(W - pad.right, yPos(0)); ctx.stroke();
      ctx.setLineDash([]);
    }

    // Draw hold line (gray)
    if (holdPct.length > 1) {
      ctx.strokeStyle = '#5a6a7e';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(xPos(0), yPos(holdPct[0]));
      for (let i = 1; i < holdPct.length; i++) ctx.lineTo(xPos(i), yPos(holdPct[i]));
      ctx.stroke();
    }

    // Draw strategy line (green)
    ctx.strokeStyle = '#00e87b';
    ctx.lineWidth = 2.5;
    ctx.shadowColor = 'rgba(0,232,123,.3)';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.moveTo(xPos(0), yPos(stratPct[0]));
    for (let i = 1; i < stratPct.length; i++) ctx.lineTo(xPos(i), yPos(stratPct[i]));
    ctx.stroke();
    ctx.shadowBlur = 0;

    // End dots
    const last = stratPct.length - 1;
    ctx.fillStyle = '#00e87b';
    ctx.beginPath(); ctx.arc(xPos(last), yPos(stratPct[last]), 4, 0, Math.PI * 2); ctx.fill();
    if (holdPct.length > 1) {
      ctx.fillStyle = '#5a6a7e';
      ctx.beginPath(); ctx.arc(xPos(last), yPos(holdPct[last]), 4, 0, Math.PI * 2); ctx.fill();
    }
  }

  function submitContact() {
    const val = document.getElementById('contactInput').value.trim();
    if (!val) return;
    // Store lead (could POST to server)
    alert('感谢！报告将发送至：' + val);
  }

  function copyWechat() {
    navigator.clipboard.writeText("XLN31689").then(() => {
      alert("✅ 微信号已复制: XLN31689");
    }).catch(() => {
      // fallback for mini-program
      const input = document.createElement("input");
      input.value = "XLN31689";
      document.body.appendChild(input);
      input.select();
      document.execCommand("copy");
      document.body.removeChild(input);
      alert("✅ 微信号已复制: XLN31689");
    });
  }

  // Enter key support
  document.getElementById('stockCode').addEventListener('keydown', e => {
    if (e.key === 'Enter') runAnalysis();
  });
</script>
</body>
</html>
